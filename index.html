<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Latenora | Privacy-first apps</title>
  <meta
    name="description"
    content="Latenora builds privacy-first apps that help people live a calmer, more balanced digital life."
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: #0f172a;
      background: #f7f4ff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .page {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.95), rgba(243,238,255,0.92) 44%, #f7f4ff 100%);
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: min(1180px, calc(100% - 40px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 46px 0 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: -280px;
      left: 50%;
      transform: translateX(-50%);
      width: 950px;
      height: 950px;
      border-radius: 50%;
      background:
        radial-gradient(circle, transparent 38%, rgba(255,255,255,0.85) 38.3%, transparent 38.7%),
        radial-gradient(circle, transparent 49%, rgba(255,255,255,0.62) 49.3%, transparent 49.7%),
        radial-gradient(circle, transparent 60%, rgba(255,255,255,0.42) 60.3%, transparent 60.7%);
      pointer-events: none;
    }

    .brand-section,
    .product-card,
    .footer-links,
    .copyright {
      position: relative;
      z-index: 1;
    }

    .brand-logo {
      width: 420px;
      max-width: 86%;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 10px 24px rgba(124, 58, 237, 0.14));
    }

    .trust-line {
      margin: 26px 0 38px;
      font-size: 18px;
      color: #64748b;
      letter-spacing: 0.2px;
    }

    .product-card {
      width: 920px;
      max-width: 100%;
      padding: 42px 58px;
      display: flex;
      align-items: center;
      gap: 64px;
      text-align: left;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 34px 90px rgba(76, 29, 149, 0.16);
      backdrop-filter: blur(18px);
    }

    .app-icon {
      width: 188px;
      height: 188px;
      border-radius: 36px;
      object-fit: cover;
      box-shadow:
        0 22px 48px rgba(91, 67, 255, 0.30),
        0 0 30px rgba(124, 58, 237, 0.22);
      flex-shrink: 0;
    }

    .product-content h1 {
      margin-bottom: 16px;
      font-size: 46px;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -1.4px;
      color: #0f172a;
    }

    .product-content p {
      margin-bottom: 28px;
      font-size: 21px;
      line-height: 1.55;
      color: #475569;
    }

    .button-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .primary-button,
    .secondary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 0 28px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 700;
      transition: 0.25s ease;
    }

    .primary-button {
      color: #ffffff;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      box-shadow: 0 16px 35px rgba(79, 70, 229, 0.35);
    }

    .secondary-button {
      color: #4f46e5;
      background: #ffffff;
      border: 1px solid rgba(79, 70, 229, 0.18);
    }

    .primary-button:hover,
    .secondary-button:hover {
      transform: translateY(-2px);
    }

    .footer-links {
      margin-top: 36px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px;
      font-size: 18px;
      font-weight: 700;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: #4f46e5;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    .footer-links span {
      color: #9b8ce8;
    }

    .copyright {
      margin-top: 22px;
      font-size: 16px;
      color: #64748b;
    }

    @media (max-width: 768px) {
      .hero {
        justify-content: flex-start;
        padding-top: 42px;
      }

      .brand-logo {
        width: 310px;
      }

      .trust-line {
        font-size: 15px;
        margin: 22px 0 28px;
      }

      .product-card {
        flex-direction: column;
        text-align: center;
        gap: 28px;
        padding: 34px 24px;
      }

      .app-icon {
        width: 138px;
        height: 138px;
        border-radius: 28px;
      }

      .product-content h1 {
        font-size: 36px;
      }

      .product-content p {
        font-size: 17px;
      }

      .button-row {
        justify-content: center;
      }

      .primary-button,
      .secondary-button {
        width: 100%;
        font-size: 15px;
      }

      .footer-links {
        font-size: 16px;
        gap: 14px;
      }

      .copyright {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">

      <div class="brand-section">
        <img
          src="assets/images/latenora-logo.png"
          alt="Latenora"
          class="brand-logo"
        />

        <p class="trust-line">
          Built with care
        </p>
      </div>

      <div class="product-card">
        <img
          src="assets/images/habitsight-icon.png"
          alt="HabitSight app icon"
          class="app-icon"
        />

        <div class="product-content">
          <h1>HabitSight</h1>

          <p>
            Understand your screen time, focus patterns,
            and digital habits — on device, with no account required.
          </p>

          <div class="button-row">
            <a href="habitsight.html" class="primary-button">
              View HabitSight
            </a>

            <a href="privacy.html" class="secondary-button">
              Privacy Policy
            </a>
          </div>
        </div>
      </div>

      <nav class="footer-links" aria-label="Footer navigation">
        <a href="privacy.html">Privacy Policy</a>
        <span>|</span>
        <a href="terms.html">Terms</a>
        <span>|</span>
        <a href="contact.html">Contact</a>
      </nav>

      <p class="copyright">
        © 2026 Latenora. All rights reserved.
      </p>

    </section>
  </main>
</body>
</html>
