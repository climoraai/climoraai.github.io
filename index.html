<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Latenora | HabitSight</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f5ff;
      color: #111827;
      text-align: center;
    }

    .hero {
      padding: 80px 24px;
      max-width: 760px;
      margin: auto;
    }

    h1 {
      font-size: 44px;
      margin-bottom: 12px;
    }

    p {
      font-size: 18px;
      color: #5f6675;
      line-height: 1.6;
    }

    .card {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px;
      margin-top: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .cta-button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #5a46f5;
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
      border: none;
      cursor: pointer;
    }

    .cta-button:hover {
      background: #4836d1;
    }

    a {
      color: #5a46f5;
      margin: 0 10px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <main class="hero">
    <h1>Latenora</h1>
    <p>Building calm, privacy-first digital wellbeing tools.</p>

    <div class="card">
      <h2>HabitSight</h2>
      <p>
        Understand your screen time, focus patterns, and digital habits
        — on device, with no account required.
      </p>

      <button class="cta-button">Coming Soon on Play Store</button>
    </div>

    <p>
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms</a>
      <a href="contact.html">Contact</a>
    </p>
  </main>
</body>
</html>
